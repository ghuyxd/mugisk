version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Mugisk Docker Compose
# Phase 1-3 — postgres + server (watcher, library indexing)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mugisk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mugisk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mugisk_dev}
      POSTGRES_DB: mugisk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mugisk -d mugisk"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - mugisk_net

  # ── Mugisk Server (Next.js) ────────────────────────────────────────────────
  # NOTE: The Dockerfile will be implemented in a future phase.
  # For now, run the server with `pnpm dev:server` from the repo root.
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: mugisk_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://mugisk:${POSTGRES_PASSWORD:-mugisk_dev}@postgres:5432/mugisk
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MUSIC_LIBRARY_PATH: ${MUSIC_LIBRARY_PATH:-/music}
      AI_API_KEY: ${AI_API_KEY:-}
    volumes:
      # rw so POST /api/admin/library/upload can write new files into the library
      - ${MUSIC_LIBRARY_PATH:-./music}:/music:rw
      # Persistent cover art (avoids re-extraction after restarts)
      - server_covers:/app/public/covers
    ports:
      - "3000:3000"
    networks:
      - mugisk_net

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: mugisk_postgres_data
  server_covers:
    name: mugisk_server_covers

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  mugisk_net:
    name: mugisk_network
    driver: bridge
